chunk:
  size: 800
  overlap: 120

retrieval:
  top_k: 20
  rerank_top_k: 10
  final_contexts: 6
  context_quota:
    topic: 2
    raw: 6
    source: 1
    index: 1
  metadata_rerank:
    stable_topic: 0.35
    stable_source: 0.15
    conflicting_penalty: 0.25
    section_match: 0.1
    doc_type_match: 0.08
    effective_date_recency: 0.12
  freshness_policy:
    enabled: true

hybrid_search:
  enabled: ${RAG_HYBRID_SEARCH_ENABLED:-true}
  dense_weight: 0.7
  sparse_weight: 0.3

prompt:
  version: v1

timeout:
  embeddings_seconds: 30
  rerank_seconds: 30
  generation_seconds: 120
  document_parser_seconds: 120
