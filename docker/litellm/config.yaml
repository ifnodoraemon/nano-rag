model_list:
  - model_name: qwen3-embed
    litellm_params:
      model: openai/qwen3-embedding-4b
      api_base: os.environ/EMBED_PROVIDER_BASE_URL
      api_key: os.environ/EMBED_PROVIDER_API_KEY

  - model_name: qwen3-rerank
    litellm_params:
      model: openai/qwen3-reranker-4b
      api_base: os.environ/RERANK_PROVIDER_BASE_URL
      api_key: os.environ/RERANK_PROVIDER_API_KEY

  - model_name: main-chat-model
    litellm_params:
      model: openai/your-chat-model
      api_base: os.environ/GEN_PROVIDER_BASE_URL
      api_key: os.environ/GEN_PROVIDER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
