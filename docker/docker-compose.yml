services:
  app:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    container_name: nano-rag-app
    ports:
      - "8000:8000"
    environment:
      APP_CONFIG_DIR: /workspace/configs
      VECTORSTORE_BACKEND: ${VECTORSTORE_BACKEND:-memory}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
    volumes:
      - ../configs:/workspace/configs
      - ../data:/workspace/data
    depends_on:
      - milvus
      - litellm-gateway
      - phoenix

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      /usr/local/bin/etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    ports:
      - "9000:9000"

  milvus:
    image: milvusdb/milvus:v2.5.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  litellm-gateway:
    image: litellm/litellm:v1.82.0-stable
    container_name: nano-rag-litellm
    env_file:
      - ./litellm/.env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: nano-rag-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
