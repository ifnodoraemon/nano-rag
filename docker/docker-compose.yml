services:
  app:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    container_name: nano-rag-app
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      APP_CONFIG_DIR: /workspace/configs
      VECTORSTORE_BACKEND: ${VECTORSTORE_BACKEND:-milvus}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1},app,phoenix,milvus,etcd,minio
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1},app,phoenix,milvus,etcd,minio
      ALL_PROXY: ""
      all_proxy: ""
      PARSED_OUTPUT_DIR: /workspace/data/parsed
      EVAL_REPORT_DIR: /workspace/data/reports/eval
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:4317}
      PHOENIX_UI_ENDPOINT: ${PHOENIX_UI_ENDPOINT:-http://phoenix:6006}
      PHOENIX_UI_HOST_HEADER: ${PHOENIX_UI_HOST_HEADER:-localhost}
      RAG_INGEST_ALLOWED_DIRS: /workspace/data/raw
      EVAL_DATASET_DIR: /workspace/data/eval
    volumes:
      - ../configs:/workspace/configs:ro
      - ../data/raw:/workspace/data/raw:ro
      - ../data/eval:/workspace/data/eval:ro
      - app-parsed-data:/workspace/data/parsed
      - app-report-data:/workspace/data/reports
    depends_on:
      milvus:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCDCTL_API: "3"
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      /usr/local/bin/etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio-data:/minio_data
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/9000 && exec 3<&- && exec 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  milvus:
    image: milvusdb/milvus:v2.6.15
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus-data:/var/lib/milvus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  bifrost:
    image: maximhq/bifrost:v1.3.9
    container_name: nano-rag-bifrost
    profiles:
      - bifrost
    env_file:
      - path: ./bifrost/.env
        required: false
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./bifrost/config.json:/app/data/config.json
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: nano-rag-frontend
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: nano-rag-phoenix
    ports:
      - "127.0.0.1:6006:6006"
      - "127.0.0.1:4317:4317"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6006', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: nano-rag-litellm
    profiles:
      - litellm
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-change-me}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  app-parsed-data:
  app-report-data:
  etcd-data:
  minio-data:
  milvus-data:
