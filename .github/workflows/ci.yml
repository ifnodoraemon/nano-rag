name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        env:
          MODEL_GATEWAY_MODE: mock
          RAG_AUTH_DISABLED: "true"
          RAG_INGEST_ALLOWED_DIRS: ${{ github.workspace }}/data/raw
        run: python -m pytest app/tests

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f docker/docker-compose.yml config --services

      - name: Build app image
        run: docker build -f docker/app.Dockerfile -t nano-rag-app:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t nano-rag-frontend:ci .
