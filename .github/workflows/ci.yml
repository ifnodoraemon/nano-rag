name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pytest
        env:
          MODEL_GATEWAY_MODE: mock
          RAG_AUTH_DISABLED: "true"
          RAG_INGEST_ALLOWED_DIRS: ${{ github.workspace }}/data/raw
        run: python -m pytest app/tests

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f docker/docker-compose.yml config --services

      - name: Build app image
        run: docker build -f docker/app.Dockerfile -t nano-rag-app:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t nano-rag-frontend:ci .
